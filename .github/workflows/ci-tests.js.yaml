# see https://code.visualstudio.com/api/working-with-extensions/continuous-integration#github-actions

name: CI Tests

on:
    push:
        branches: ['main']
    pull_request:
        branches: ['main']

jobs:
    ci:
        strategy:
            matrix:
                os: [ubuntu-latesti, windows-latest, macos-latest]
        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout
              uses: actions/checkout@v5
            - name: Install Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24.x
            - run: npm install
            - run: xvfb-run -a npm test
              if: runner.os == 'Linux'
            - run: npm test
              if: runner.os != 'Linux'
